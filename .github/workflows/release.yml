name: Release Neon

on:
  push:
    tags:
      - 'v*' # Trigger workflow on pushes that match v*, like v1.2-beta

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Neon - ${{ github.ref_name }} 🚀
          draft: false
          prerelease: true
          body: |
            ## Neon (${{ github.ref_name }}) 🎉
            **Welcome to the Neon Beta release of OKSO!**
            
            This release introduces a robust notification system and advanced task scheduling, ensuring you never miss an event or fall behind on your syllabus.
            
            ### ✨ Features Included:
            - **Intelligent Notification Engine**: Completely re-written to run natively in local background using latest `flutter_local_notifications` API.
            - **Quest & Event Reminders**: Event reminders pop up 5 days, 3 days, 1 day, and on the day of the event. Quests will seamlessly remind you to complete them daily.
            - **Syllabus Progress Interventions**: Automated daily spam reminders triggers if an exam is within 3 days and your syllabus is incomplete!
            - **Precise Event Time Selection**: The 'Save Event' UI now supports a dual date & time picker, saving exact hour/minutes to power exact minute-level notifications.
            - **Linux Desktop Support**: Bundled new custom icons with `AssetsLinuxIcon` for comprehensive Linux environment support.
            - **Plugin upgrades**: Upgraded core notification plugins to v21 and finalized named-parameter refactors.
            - **Bug Fixes & Stabilizations**: Resolved overlapping text issues, null pointer exceptions when handling empty exam values, and fixed the Linux VM `UnimplementedError` build crash.
                        
            ### 📦 Download
            Install the attached `app-release.apk` directly onto your Android device to experience the Neon release!
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
